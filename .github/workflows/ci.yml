name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # build: configure, compile, run the model-independent unit tests. Runs on
  # every push and pull_request. Never downloads a model — fast gate.
  # -------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: configure
        # GGML_NATIVE=OFF for portability in CI (no host-cpu ISA extensions)
        run: cmake -B build -DFACEDETECT_BUILD_TESTS=ON -DGGML_NATIVE=OFF

      - name: build
        run: cmake --build build -j

      - name: test (model-independent only)
        # -LE model excludes the model/baseline-labelled tests (test_align,
        # check_convert) that need the Python venv + reference baseline.
        run: ctest --test-dir build --output-on-failure -LE model
